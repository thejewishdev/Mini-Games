<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Math Game</title>
    <link rel="stylesheet" href="spider_game.css">
</head>
<body>
    <header id="heroName">Hero Math Challenge</header>

    <div class="game-box">
        <div id="lives">❤️❤️❤️</div>

        <div id="question">Loading...</div>
        <input type="number" id="answer" placeholder="?" />
        <br>
        <button onclick="checkAnswer()">Shoot Answer 🕸️</button>
        <div id="score">Score: 0</div>
    </div>

    <script src="spider_game.js"></script>
</body>
</html>
