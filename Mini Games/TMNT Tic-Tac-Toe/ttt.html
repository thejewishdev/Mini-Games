<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <!-- <link rel="stylesheet" href="ttt.css"> -->
    <title></title>

  </head>
  <body>



    <div class="board-container">



      <table>
        <tr>
          <td style="border-right: 3px solid #4c9c23; border-bottom: 3px solid #4c9c23;"> </td>
          <td style="border: 3px solid #4c9c23; border-top: none;"> </td>
          <td style="border: 3px solid #4c9c23; border-top: none; border-right: none;"> </td>
        </tr>
        <tr>
          <td style="border: 3px solid #4c9c23; border-left: none;"> </td>
          <td style="border: 3px solid #4c9c23;"> </td>
          <td style="border: 3px solid #4c9c23; border-right: none;"> </td>
        </tr>
        <tr>
          <td style="border: 3px solid #4c9c23; border-left: none; border-bottom: none;"> </td>
          <td style="border: 3px solid #4c9c23; border-bottom: none;"> </td>
          <td style="border: 3px solid #4c9c23; border-right: none; border-bottom: none;"> </td>
        </tr>
      </table>

      <div class="mybuttons">
        <button id="start" type="button" name="start">Start</button>
        <button id="reset" type="button" name="reset">Reset</button>
      </div>



    </div>



    <script src="ttt.js">

    </script>
  </body>
</html>
