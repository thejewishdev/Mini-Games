<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <!-- <link rel="stylesheet" href="spider_game.css"> -->
    <title></title>

  </head>
  <body>
    <div class="container">
        <h1 id="title">🌊 SpongeBob Number Guessing Game 🌊</h1>
        <p id="hero-display"></p>

        <p>Guess a number between <span id="min">1</span> and <span id="max">100</span>:</p>
        <input type="number" id="guess-input" placeholder="Enter your guess">
        <button id="guess-btn">Guess</button>
        <p id="feedback"></p>
        <p id="attempts">Attempts left: <span id="attempts-count">10</span></p>
        <button id="restart-btn">Restart Game</button>
    </div>





    <script src="spider_game.js">

    </script>
  </body>
</html>
